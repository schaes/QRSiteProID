<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moonstone Rewards</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Moonstone Rewards</h1>
    <div id="rewardContainer">
        <p id="timeLeft">Time left until you can claim your reward: </p>
        
        <div id ="imageContainer">
            <!-- Image Map Generated by http://www.image-map.net/ -->
            <img src="images/bg.png" height=auto width=100% usemap="#image-map">

            <map name="image-map">
                <area id="info1"  alt="info1" title="info1" coords="-3,1,-3,1236,2477,522,2475,1,2359,-4,2188,1" shape="poly">
                <area id="info2"  alt="info2" title="info2" coords="-3,1282,2477,575,2475,1991,-3,2196" shape="poly">
                <area id="info3"  alt="info3" title="info3" coords="4,2248,1264,2136,949,3504,4,3508" shape="poly">
            </map>
        </div>
        <div id="mascot">
            <img src="images/moonstoneMas.png" alt="Mascot">
        </div>
        <div id="dialogueBox">
            <p id="dialogueMessage"></p>
        </div>
        <button id="claimRewardButton" style="display: none;">Claim Reward</button>
        <div id="rewards">
            <img id="rewardImage" src="images/placeholder.png" alt="Reward Image">
            <p></p>
            <img id="rewardBarCode" src="images/barcode.png" alt="Reward Image 2" width=200% height=auto>
            <p id="rewardMessage"></p>
        </div>

    </div>

</body>
<script src="script.js"></script>
